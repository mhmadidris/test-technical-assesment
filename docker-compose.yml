services:
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: customer_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mock-server:
    build: ./mock-server
    container_name: mock-server
    ports:
      - "5000:5000"
    volumes:
      - ./mock-server:/app
    environment:
      - FLASK_ENV=development
    depends_on:
      postgres:
        condition: service_healthy

  pipeline-service:
    build: ./pipeline-service
    container_name: pipeline-service
    ports:
      - "8000:8000"
    volumes:
      - ./pipeline-service:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/customer_db
      - MOCK_SERVER_URL=http://mock-server:5000/api/customers
    depends_on:
      postgres:
        condition: service_healthy
      mock-server:
        condition: service_started
